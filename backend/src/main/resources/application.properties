# 数据库连接配置 (使用H2内存数据库)
spring.profiles.active=mysql

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8082

# 禁用 favicon
spring.mvc.favicon.enabled=false

# 禁用 DevTools 自动重启
spring.devtools.restart.enabled=false

# CORS configuration
cors.allowed.origins=*

# HTTP编码配置 - 解决中文乱码问题
server.servlet.encoding.charset=utf-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
spring.http.encoding.charset=utf-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true

# JWT配置
jwt.secret=student_analysis_system_secret_key_for_jwt_authentication_minimum_256_bits
jwt.expiration=36000000

# Swagger/OpenAPI配置
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# 文件上传配置
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
file.upload-dir=uploads

# Jackson配置 - 解决Hibernate代理序列化问题
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.serialization.write-dates-as-timestamps=false
# 注释掉这行，允许null值在JSON中显示
# spring.jackson.default-property-inclusion=non_null

# ==================== AI中间件配置 ====================
# 默认模型
ai.middleware.default-model=deepseek

# DeepSeek配置 - 优化版本
ai.middleware.models.deepseek.name=DeepSeek Chat
ai.middleware.models.deepseek.type=DEEPSEEK
ai.middleware.models.deepseek.endpoint=https://api.deepseek.com/v1/chat/completions
//在部署前请在下方配置项中填写明文API密钥
ai.middleware.models.deepseek.api-key=
ai.middleware.models.deepseek.max-tokens=1000
ai.middleware.models.deepseek.temperature=0.3
ai.middleware.models.deepseek.timeout=15000
ai.middleware.models.deepseek.enabled=true
ai.middleware.models.deepseek.stream=false

# OpenAI配置（暂时禁用）
ai.middleware.models.openai.name=OpenAI GPT-4
ai.middleware.models.openai.type=OPENAI
ai.middleware.models.openai.endpoint=https://api.openai.com/v1/chat/completions
ai.middleware.models.openai.api-key=
ai.middleware.models.openai.max-tokens=2000
ai.middleware.models.openai.temperature=0.7
ai.middleware.models.openai.timeout=30000
ai.middleware.models.openai.enabled=false

# Claude配置（暂时禁用）
ai.middleware.models.claude.name=Claude 3 Sonnet
ai.middleware.models.claude.type=CLAUDE
ai.middleware.models.claude.endpoint=https://api.anthropic.com/v1/messages
ai.middleware.models.claude.api-key=
ai.middleware.models.claude.max-tokens=2000
ai.middleware.models.claude.temperature=0.7
ai.middleware.models.claude.timeout=30000
ai.middleware.models.claude.enabled=false

# Local模型配置（暂时禁用）
ai.middleware.models.local.name=Local LLM
ai.middleware.models.local.type=LOCAL
ai.middleware.models.local.endpoint=http://localhost:11434/api/generate
ai.middleware.models.local.api-key=
ai.middleware.models.local.max-tokens=2000
ai.middleware.models.local.temperature=0.7
ai.middleware.models.local.timeout=60000
ai.middleware.models.local.enabled=false

# 缓存配置
ai.middleware.cache.enabled=true
ai.middleware.cache.ttl=3600

# 限流配置
ai.middleware.rate-limit.enabled=true
ai.middleware.rate-limit.requests-per-minute=60

# 日志配置
ai.middleware.logging.enabled=true
ai.middleware.logging.level=INFO