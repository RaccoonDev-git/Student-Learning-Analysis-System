<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忘记密码 - 学情分析系统</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>
        <div class="container header-container">
            <div class="logo">
                <h1>学情分析</h1>
            </div>
            <div class="header-buttons">
                <button class="nav-btn" onclick="window.location.href='../index.html'">返回首页</button>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="login-container">
            <section class="login-section">
                <h2>忘记密码</h2>
                <form id="forgot-password-form">
                    <div class="form-group">
                        <input type="text" id="phone" placeholder="请输入您的手机号" required>
                    </div>
                    <div class="form-group">
                        <div style="display: flex; gap: 10px;">
                            <input type="text" id="verification-code" placeholder="请输入验证码" required style="flex: 1;">
                            <button type="button" id="send-code-btn" class="btn primary-btn" style="white-space: nowrap;">发送验证码</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <input type="password" id="new-password" placeholder="请输入新密码" required>
                    </div>
                    <div class="form-group">
                        <input type="password" id="confirm-password" placeholder="请再次输入新密码" required>
                    </div>
                    <div class="form-group">
                        <button type="submit" class="btn primary-btn">重置密码</button>
                    </div>
                </form>
                <div class="form-links">
                    <a href="#" class="form-link">返回教师登录</a>
                </div>
            </section>
        </div>
    </main>

    <footer>
        <div class="container">
            <p class="system-description">数据驱动教学决策·AI赋能个性化学习</p>
            <p>&copy; 2023 学情分析系统. 保留所有权利.</p>
            <p class="support-info">技术支持单位：XXX科技有限公司</p>
        </div>
    </footer>

    <script>
        // API基础URL - 使用相对路径解决Trae CN部署问题
        const API_URL = '/api';

        // 页面加载时立即执行
        (function() {
            // 根据URL参数或referrer设置返回链接
            const urlParams = new URLSearchParams(window.location.search);
            let from = urlParams.get('from');
            const returnLink = document.querySelector('.form-links a');
            
            // 添加调试信息
            console.log('URL参数 from:', from);
            console.log('Referrer:', document.referrer);
            
            // 如果URL参数中没有from，则尝试从referrer中获取
            if (!from && document.referrer) {
                if (document.referrer.includes('student')) {
                    from = 'student';
                } else if (document.referrer.includes('teacher')) {
                    from = 'teacher';
                }
            }
            
            if (from === 'student') {
                returnLink.href = 'pages/student/student-login.html';
                returnLink.textContent = '返回学生登录';
                console.log('设置为学生登录');
            } else if (from === 'teacher') {
                returnLink.href = 'pages/teacher/teacher-login.html';
                returnLink.textContent = '返回教师登录';
                console.log('设置为教师登录');
            } else {
                // 默认返回教师登录页面
                returnLink.href = 'pages/teacher/teacher-login.html';
                returnLink.textContent = '返回教师登录';
                console.log('设置为默认教师登录');
            }
        })();
        
        // 等待DOM加载完成
        document.addEventListener('DOMContentLoaded', function() {
            // 验证码倒计时功能
            let countdown = 60;
            let countdownInterval;
            
            function startCountdown() {
                console.log('开始倒计时');
                const sendCodeBtn = document.getElementById('send-code-btn');

                // 禁用按钮并开始倒计时
                sendCodeBtn.disabled = true;
                sendCodeBtn.textContent = `${countdown}秒后重新发送`;

                countdownInterval = setInterval(() => {
                    countdown--;
                    sendCodeBtn.textContent = `${countdown}秒后重新发送`;

                    if (countdown <= 0) {
                        clearInterval(countdownInterval);
                        sendCodeBtn.disabled = false;
                        sendCodeBtn.textContent = '发送验证码';
                        countdown = 60; // 重置倒计时
                    }
                }, 1000);
            }

            // 发送验证码按钮点击事件
            const sendCodeBtn = document.getElementById('send-code-btn');
            if (sendCodeBtn) {
                sendCodeBtn.addEventListener('click', function() {
                    const phone = document.getElementById('phone').value;
                    if (!phone) {
                        alert('请输入手机号');
                        return;
                    }

                    // 这里应该发送请求到后端发送验证码
                    console.log('发送验证码到:', phone);
                    
                    // 开始倒计时
                    startCountdown();
                    
                    // 模拟发送成功
                    alert('验证码已发送到您的手机');
                });
            } else {
                console.log('未找到发送验证码按钮');
            }

            const forgotPasswordForm = document.getElementById('forgot-password-form');
            if (forgotPasswordForm) {
                forgotPasswordForm.addEventListener('submit', function(event) {
                    event.preventDefault();
                    const phone = document.getElementById('phone').value;
                    const verificationCode = document.getElementById('verification-code').value;
                    const newPassword = document.getElementById('new-password').value;
                    const confirmPassword = document.getElementById('confirm-password').value;
                    
                    // 简单验证
                    if (phone && verificationCode && newPassword && confirmPassword) {
                        if (newPassword !== confirmPassword) {
                            alert('新密码和确认密码不一致');
                            return;
                        }
                        
                        // 准备重置密码数据
                        const resetData = {
                            phone: phone,
                            code: verificationCode,
                            newPassword: newPassword
                        };
                        
                        // 发送重置密码请求到后端
                        fetch(`${API_URL}/auth/reset-password`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify(resetData)
                        })
                        .then(response => {
                            // 检查响应是否成功
                            if (response.ok) {
                                // 尝试将响应解析为JSON
                                return response.json().catch(() => {
                                    // 如果解析失败，返回一个成功的对象
                                    return { success: true };
                                });
                            } else {
                                // 响应不成功，尝试获取错误信息
                                return response.json().catch(() => {
                                    // 如果解析失败，返回错误信息
                                    return { success: false, message: '重置密码失败' };
                                });
                            }
                        })
                        .then(data => {
                            if (data.success) {
                                // 重置密码成功
                                alert('密码重置成功，请重新登录');
                                // 根据URL参数返回相应登录页
                                const urlParams = new URLSearchParams(window.location.search);
                                let from = urlParams.get('from');
                                
                                // 如果URL参数中没有from，则尝试从referrer中获取
                                if (!from && document.referrer) {
                                    if (document.referrer.includes('student')) {
                                        from = 'student';
                                    } else if (document.referrer.includes('teacher')) {
                                        from = 'teacher';
                                    }
                                }
                                
                                if (from === 'student') {
                                    window.location.href = 'pages/student/student-login.html';
                                } else {
                                    window.location.href = 'pages/teacher/teacher-login.html';
                                }
                            } else {
                                // 重置密码失败
                                alert('密码重置失败: ' + data.message);
                            }
                        })
                        .catch(error => {
                            console.error('重置密码错误:', error);
                            alert('重置密码过程中发生错误');
                        });
                    } else {
                        alert('请填写所有字段');
                    }
                });
            }
        });
    </script>
</body>
</html>
