<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>教师注册 - 步骤2 - 学情分析系统</title>
    <link rel="stylesheet" href="../../assets/css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
  </head>
  <body>
    <header>
      <div class="container header-container">
        <div class="logo">
          <h1>学情分析</h1>
        </div>
        <div class="header-buttons">
          <button class="nav-btn" onclick="window.location.href='index.html'">
            返回首页
          </button>
        </div>
      </div>
    </header>

    <main class="container">
      <div class="login-container">
        <section class="login-section">
          <h2>教师注册</h2>
          <form id="teacher-register-form">
            <div class="form-group">
              <input
                type="text"
                id="teacher-phone"
                placeholder="请输入您的手机号"
                required
              />
            </div>
            <div class="form-group">
              <div style="display: flex; gap: 10px">
                <input
                  type="text"
                  id="verification-code"
                  placeholder="请输入验证码"
                  required
                  style="flex: 1"
                />
                <button
                  type="button"
                  id="send-code-btn"
                  class="btn primary-btn"
                  style="white-space: nowrap"
                >
                  发送验证码
                </button>
              </div>
            </div>
            <div class="form-group">
              <input
                type="password"
                id="teacher-password"
                placeholder="请输入密码"
                required
              />
            </div>
            <div class="form-group">
              <input
                type="password"
                id="confirm-password"
                placeholder="请再次输入密码"
                required
              />
            </div>
            <div class="form-group">
              <button type="submit" class="btn primary-btn">注册</button>
              <button
                type="button"
                id="back-to-step1"
                class="btn secondary-btn"
                style="margin-left: 10px"
              >
                返回上一步
              </button>
            </div>
          </form>
          <div class="form-links">
            <a href="../../../teacher-login.html" class="form-link"
              >已有账号？立即登录</a
            >
          </div>
        </section>
      </div>
    </main>

    <footer>
      <div class="container">
        <p class="system-description">数据驱动教学决策·AI赋能个性化学习</p>
        <p>&copy; 2023 学情分析系统. 保留所有权利.</p>
        <p class="support-info">技术支持单位：XXX科技有限公司</p>
      </div>
    </footer>

    <script>
      // API基础URL - 使用相对路径解决Trae CN部署问题
      const API_URL = "/api";

      // 等待DOM加载完成
      document.addEventListener("DOMContentLoaded", function () {
        // 从sessionStorage获取第一步的信息
        const teacherSchool = sessionStorage.getItem("teacherSchool");
        const teacherId = sessionStorage.getItem("teacherId");

        // 如果没有第一步的信息，重定向到第一步
        if (!teacherSchool || !teacherId) {
          window.location.href = "teacher-register-step1.html";
          return;
        }

        // 验证码倒计时功能
        let countdown = 60;
        let countdownInterval;

        function startCountdown() {
          console.log("开始倒计时");
          const sendCodeBtn = document.getElementById("send-code-btn");

          // 禁用按钮并开始倒计时
          sendCodeBtn.disabled = true;
          sendCodeBtn.textContent = `${countdown}秒后重新发送`;

          countdownInterval = setInterval(() => {
            countdown--;
            sendCodeBtn.textContent = `${countdown}秒后重新发送`;

            if (countdown <= 0) {
              clearInterval(countdownInterval);
              sendCodeBtn.disabled = false;
              sendCodeBtn.textContent = "发送验证码";
              countdown = 60; // 重置倒计时
            }
          }, 1000);
        }

        // 发送验证码按钮点击事件
        const sendCodeBtn = document.getElementById("send-code-btn");
        if (sendCodeBtn) {
          sendCodeBtn.addEventListener("click", function () {
            const phone = document.getElementById("teacher-phone").value;
            if (!phone) {
              alert("请输入手机号");
              return;
            }

            // 这里应该发送请求到后端发送验证码
            console.log("发送验证码到:", phone);

            // 开始倒计时
            startCountdown();

            // 模拟发送成功
            alert("验证码已发送到您的手机");
          });
        } else {
          console.log("未找到发送验证码按钮");
        }

        // 返回上一步按钮点击事件
        const backToStep1Btn = document.getElementById("back-to-step1");
        if (backToStep1Btn) {
          backToStep1Btn.addEventListener("click", function () {
            window.location.href = "teacher-register-step1.html";
          });
        }

        const registerForm = document.getElementById("teacher-register-form");
        if (registerForm) {
          registerForm.addEventListener("submit", function (event) {
            event.preventDefault();
            const phone = document.getElementById("teacher-phone").value;
            const verificationCode =
              document.getElementById("verification-code").value;
            const password = document.getElementById("teacher-password").value;
            const confirmPassword =
              document.getElementById("confirm-password").value;

            // 简单验证
            if (phone && verificationCode && password && confirmPassword) {
              if (password !== confirmPassword) {
                alert("密码和确认密码不一致");
                return;
              }

              // 准备注册数据，包含从第一步获取的学校和工号
              const userData = {
                username: phone,
                password: password,
                role: "TEACHER",
                phone: phone,
                school: teacherSchool,
                teacherId: teacherId,
              };

              // 发送注册请求到后端
              fetch(`${API_URL}/authentication/register`, {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                },
                body: JSON.stringify(userData),
              })
                .then((response) => response.json())
                .then((data) => {
                  if (data.id) {
                    // 注册成功，清除sessionStorage中的临时数据
                    sessionStorage.removeItem("teacherSchool");
                    sessionStorage.removeItem("teacherId");

                    // 注册成功
                    alert("注册成功，请登录");
                    window.location.href = "teacher-login.html";
                  } else {
                    // 注册失败
                    alert("注册失败: " + data);
                  }
                })
                .catch((error) => {
                  console.error("注册错误:", error);
                  alert("注册过程中发生错误");
                });
            } else {
              alert("请填写所有字段");
            }
          });
        }
      });
    </script>
  </body>
</html>
