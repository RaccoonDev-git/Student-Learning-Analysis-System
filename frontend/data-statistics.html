<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>数据统计 - 学情分析系统</title>
    <script src="./js/chart.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", "微软雅黑", sans-serif;
      }

      body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        color: #fff;
        padding: 20px;
      }

      .container {
        max-width: 1400px;
        margin: 0 auto;
      }

      /* 导航栏 */
      .navbar {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        border-radius: 15px;
        padding: 20px 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
      }

      .navbar h1 {
        font-size: 24px;
      }

      .back-btn {
        background: rgba(255, 255, 255, 0.2);
        border: none;
        padding: 10px 20px;
        border-radius: 8px;
        color: #fff;
        cursor: pointer;
        text-decoration: none;
        transition: all 0.3s;
      }

      .back-btn:hover {
        background: rgba(255, 255, 255, 0.3);
      }

      /* 筛选器面板 */
      .filter-panel {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        border-radius: 15px;
        padding: 25px;
        margin-bottom: 30px;
      }

      .filter-title {
        font-size: 18px;
        font-weight: 600;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .filter-controls {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
        align-items: end;
      }

      .filter-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .filter-group label {
        font-size: 14px;
        font-weight: 500;
        opacity: 0.9;
      }

      .filter-input,
      .filter-select {
        padding: 10px;
        border: none;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.2);
        color: #fff;
        font-size: 14px;
      }

      .filter-input:focus,
      .filter-select:focus {
        outline: 2px solid rgba(255, 255, 255, 0.5);
        background: rgba(255, 255, 255, 0.25);
      }

      .filter-select option {
        background: #764ba2;
        color: #fff;
      }

      .date-range {
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .date-range input {
        flex: 1;
      }

      .filter-actions {
        display: flex;
        gap: 10px;
      }

      .filter-btn {
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.3s;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .apply-btn {
        background: rgba(67, 233, 123, 0.8);
        color: #fff;
        flex: 1;
      }

      .apply-btn:hover {
        background: rgba(67, 233, 123, 1);
        transform: translateY(-2px);
      }

      .reset-btn {
        background: rgba(255, 255, 255, 0.2);
        color: #fff;
        flex: 1;
      }

      .reset-btn:hover {
        background: rgba(255, 255, 255, 0.3);
        transform: translateY(-2px);
      }

      /* 图表网格 */
      .charts-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
      }

      .chart-card {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        border-radius: 15px;
        padding: 25px;
      }

      .chart-title {
        font-size: 18px;
        font-weight: 600;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .chart-container {
        position: relative;
        height: 300px;
      }

      /* 统计卡片 */
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
      }

      .stat-card {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        border-radius: 15px;
        padding: 20px;
        text-align: center;
      }

      .stat-value {
        font-size: 32px;
        font-weight: 700;
        margin: 10px 0;
      }

      .stat-label {
        font-size: 14px;
        opacity: 0.9;
      }

      /* 加载动画 */
      .loading {
        text-align: center;
        padding: 40px;
        font-size: 18px;
      }

      .loading i {
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      /* 响应式 */
      @media (max-width: 768px) {
        .charts-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- 导航栏 -->
      <div class="navbar">
        <h1><i class="fas fa-chart-bar"></i> 数据统计与报表</h1>
        <a href="admin.html" class="back-btn">
          <i class="fas fa-arrow-left"></i> 返回控制台
        </a>
      </div>

      <!-- 筛选器面板 -->
      <div class="filter-panel">
        <div class="filter-title">
          <i class="fas fa-filter"></i>
          数据筛选
        </div>
        <div class="filter-controls">
          <div class="filter-group">
            <label>时间范围</label>
            <div class="date-range">
              <input type="date" id="start-date" class="filter-input" />
              <span style="margin: 0 5px">至</span>
              <input type="date" id="end-date" class="filter-input" />
            </div>
          </div>
          <div class="filter-group">
            <label>课程</label>
            <select id="course-filter" class="filter-select">
              <option value="">全部课程</option>
            </select>
          </div>
          <div class="filter-group">
            <label>学期</label>
            <select id="semester-filter" class="filter-select">
              <option value="">全部学期</option>
              <option value="2024-1">2024春季</option>
              <option value="2024-2">2024秋季</option>
              <option value="2023-1">2023春季</option>
              <option value="2023-2">2023秋季</option>
            </select>
          </div>
          <div class="filter-group">
            <label>成绩等级</label>
            <select id="grade-level-filter" class="filter-select">
              <option value="">全部等级</option>
              <option value="A">A(优秀)</option>
              <option value="B">B(良好)</option>
              <option value="C">C(中等)</option>
              <option value="D">D(及格)</option>
              <option value="F">F(不及格)</option>
            </select>
          </div>
          <div class="filter-actions">
            <button class="filter-btn apply-btn" onclick="applyFilters()">
              <i class="fas fa-check"></i> 应用筛选
            </button>
            <button class="filter-btn reset-btn" onclick="resetFilters()">
              <i class="fas fa-redo"></i> 重置
            </button>
          </div>
        </div>
      </div>

      <!-- 统计概览 -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="avg-score">-</div>
          <div class="stat-label">平均成绩</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="total-grades">-</div>
          <div class="stat-label">成绩记录数</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="active-courses">-</div>
          <div class="stat-label">活跃课程数</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="enrollment-count">-</div>
          <div class="stat-label">选课记录数</div>
        </div>
      </div>

      <!-- 图表展示 -->
      <div class="charts-grid">
        <!-- 成绩分布图 -->
        <div class="chart-card">
          <div class="chart-title">
            <i class="fas fa-chart-pie"></i>
            成绩分布
          </div>
          <div class="chart-container">
            <canvas id="gradeDistributionChart"></canvas>
          </div>
        </div>

        <!-- 课程成绩对比 -->
        <div class="chart-card">
          <div class="chart-title">
            <i class="fas fa-chart-bar"></i>
            课程平均成绩
          </div>
          <div class="chart-container">
            <canvas id="courseAvgChart"></canvas>
          </div>
        </div>

        <!-- 学期成绩趋势 -->
        <div class="chart-card">
          <div class="chart-title">
            <i class="fas fa-chart-line"></i>
            学期成绩趋势
          </div>
          <div class="chart-container">
            <canvas id="semesterTrendChart"></canvas>
          </div>
        </div>

        <!-- 教师授课统计 -->
        <div class="chart-card">
          <div class="chart-title">
            <i class="fas fa-chalkboard-teacher"></i>
            教师授课数量
          </div>
          <div class="chart-container">
            <canvas id="teacherCoursesChart"></canvas>
          </div>
        </div>
      </div>
    </div>

    <script>
      const API_BASE_URL = "/api";

      // 检查管理员权限
      function checkAdmin() {
        const token = localStorage.getItem("token");
        if (!token) {
          window.location.href = "/index.html";
          return false;
        }

        try {
          const payload = JSON.parse(atob(token.split(".")[1]));
          if (payload.role !== "ADMIN") {
            alert("无权访问此页面");
            window.location.href = "/admin.html";
            return false;
          }
          return true;
        } catch (error) {
          console.error("解析token失败:", error);
          window.location.href = "/index.html";
          return false;
        }
      }

      // 获取token和headers
      function getHeaders() {
        return {
          Authorization: `Bearer ${localStorage.getItem("token")}`,
          "Content-Type": "application/json",
        };
      }

      // 全局变量存储原始数据
      let allGrades = [];
      let allCourses = [];
      let allEnrollments = [];

      // 加载统计数据
      async function loadStatistics() {
        try {
          const headers = getHeaders();

          // 获取成绩数据
          const gradesRes = await fetch(`${API_BASE_URL}/grades`, { headers });
          allGrades = await gradesRes.json();

          // 获取课程数据
          const coursesRes = await fetch(`${API_BASE_URL}/courses`, {
            headers,
          });
          allCourses = await coursesRes.json();

          // 获取选课数据
          const enrollmentsRes = await fetch(`${API_BASE_URL}/enrollments`, {
            headers,
          });
          allEnrollments = await enrollmentsRes.json();

          // 填充课程下拉选择器
          populateCourseFilter(allCourses);

          // 应用筛选并显示数据
          applyFilters();
        } catch (error) {
          console.error("加载统计数据失败:", error);
          alert("加载数据失败: " + error.message);
        }
      }

      // 填充课程筛选器
      function populateCourseFilter(courses) {
        const select = document.getElementById("course-filter");
        select.innerHTML = '<option value="">全部课程</option>';
        courses.forEach((course) => {
          const option = document.createElement("option");
          option.value = course.id;
          option.textContent = course.name;
          select.appendChild(option);
        });
      }

      // 应用筛选器
      async function applyFilters() {
        const startDate = document.getElementById("start-date").value;
        const endDate = document.getElementById("end-date").value;
        const courseId = document.getElementById("course-filter").value;
        const semester = document.getElementById("semester-filter").value;
        const gradeLevel = document.getElementById("grade-level-filter").value;

        // 筛选成绩数据
        let filteredGrades = allGrades.filter((g) => {
          // 时间筛选
          if (startDate && g.examDate < startDate) return false;
          if (endDate && g.examDate > endDate) return false;
          // 课程筛选
          if (courseId && g.courseId != courseId) return false;
          // 学期筛选
          if (semester) {
            const course = allCourses.find((c) => c.id === g.courseId);
            if (!course || course.semester !== semester) return false;
          }
          // 等级筛选
          if (gradeLevel && g.gradeLevel !== gradeLevel) return false;
          return true;
        });

        // 筛选课程数据
        let filteredCourses = allCourses;
        if (semester) {
          filteredCourses = allCourses.filter((c) => c.semester === semester);
        }

        // 优先从后端分析接口获取统计（当选择了学期或年级时），否则本地计算
        let backendStats = null;
        try {
          if (semester || gradeLevel) {
            backendStats = await fetchGradeStatistics({ semester, gradeLevel });
          }
        } catch (e) {
          console.warn("加载分析统计失败，回退至前端计算:", e);
        }

        // 更新统计数据和图表（优先使用后端统计的分布数据）
        updateStatisticsWithBackend(
          filteredGrades,
          filteredCourses,
          allEnrollments,
          backendStats
        );
      }

      // 重置筛选器
      function resetFilters() {
        document.getElementById("start-date").value = "";
        document.getElementById("end-date").value = "";
        document.getElementById("course-filter").value = "";
        document.getElementById("semester-filter").value = "";
        document.getElementById("grade-level-filter").value = "";
        applyFilters();
      }

      // 更新统计数据和图表
      function updateStatistics(grades, courses, enrollments) {
        // 计算统计数据
        const avgScore =
          grades.length > 0
            ? (
                grades.reduce((sum, g) => sum + g.score, 0) / grades.length
              ).toFixed(2)
            : 0;

        document.getElementById("avg-score").textContent = avgScore;
        document.getElementById("total-grades").textContent = grades.length;
        document.getElementById("active-courses").textContent = courses.filter(
          (c) => c.status === "ACTIVE"
        ).length;
        document.getElementById("enrollment-count").textContent =
          enrollments.length;

        // 清除旧图表
        Chart.helpers.each(Chart.instances, function (instance) {
          instance.destroy();
        });

        // 绘制图表
        drawGradeDistribution(grades);
        drawCourseAverage(grades, courses);
        drawSemesterTrend(courses, grades);
        drawTeacherCourses(courses);
      }

      // 使用后端统计（若可用）更新统计与图表
      function updateStatisticsWithBackend(
        grades,
        courses,
        enrollments,
        stats
      ) {
        // 计算统计数据（仍基于前端数据）
        const avgScore =
          grades.length > 0
            ? (
                grades.reduce((sum, g) => sum + g.score, 0) / grades.length
              ).toFixed(2)
            : 0;

        document.getElementById("avg-score").textContent = avgScore;
        document.getElementById("total-grades").textContent = grades.length;
        document.getElementById("active-courses").textContent = courses.filter(
          (c) => c.status === "ACTIVE"
        ).length;
        document.getElementById("enrollment-count").textContent =
          enrollments.length;

        // 清除旧图表
        Chart.helpers.each(Chart.instances, function (instance) {
          instance.destroy();
        });

        // 分布图优先使用后端统计
        if (stats && stats.scoreDistribution) {
          drawGradeDistributionFromStats(stats.scoreDistribution);
        } else {
          drawGradeDistribution(grades);
        }

        // 其余图表沿用前端数据
        drawCourseAverage(grades, courses);
        drawSemesterTrend(courses, grades);
        drawTeacherCourses(courses);
      }

      // 从后端统计分布绘制成绩分布图
      function drawGradeDistributionFromStats(scoreDistribution) {
        const labels = ["90-100", "80-89", "70-79", "60-69", "0-59"];
        const data = labels.map((k) => scoreDistribution[k] || 0);

        const ctx = document
          .getElementById("gradeDistributionChart")
          .getContext("2d");
        new Chart(ctx, {
          type: "doughnut",
          data: {
            labels,
            datasets: [
              {
                data,
                backgroundColor: [
                  "rgba(67, 233, 123, 0.8)",
                  "rgba(79, 172, 254, 0.8)",
                  "rgba(240, 147, 251, 0.8)",
                  "rgba(255, 165, 0, 0.8)",
                  "rgba(255, 100, 100, 0.8)",
                ],
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: {
                labels: { color: "#fff" },
              },
            },
          },
        });
      }

      // 调用后端分析服务
      async function fetchGradeStatistics({
        courseId,
        className,
        major,
        semester,
        gradeLevel,
      }) {
        const token = localStorage.getItem("token");
        const headers = {
          "Content-Type": "application/json",
          ...(token ? { Authorization: `Bearer ${token}` } : {}),
        };

        const url = new URL(
          `${API_BASE_URL.replace("/api", "")}/api/analysis/grade-statistics`
        );
        if (courseId) url.searchParams.append("courseId", courseId);
        if (className) url.searchParams.append("className", className);
        if (major) url.searchParams.append("major", major);
        if (semester) url.searchParams.append("semester", semester);
        if (gradeLevel) url.searchParams.append("gradeLevel", gradeLevel);

        const res = await fetch(url.toString(), { headers });
        if (!res.ok) throw new Error(`分析接口错误: ${res.status}`);
        return await res.json();
      }

      //     // 获取成绩数据

      //     const grades = await gradesRes.json();
      //     // 获取课程数据

      //     const enrollments = await enrollmentsRes.json();

      // 绘制成绩分布图
      function drawGradeDistribution(grades) {
        const ranges = {
          "优秀(90-100)": 0,
          "良好(80-89)": 0,
          "中等(70-79)": 0,
          "及格(60-69)": 0,
          "不及格(<60)": 0,
        };

        grades.forEach((g) => {
          if (g.score >= 90) ranges["优秀(90-100)"]++;
          else if (g.score >= 80) ranges["良好(80-89)"]++;
          else if (g.score >= 70) ranges["中等(70-79)"]++;
          else if (g.score >= 60) ranges["及格(60-69)"]++;
          else ranges["不及格(<60)"]++;
        });

        const ctx = document
          .getElementById("gradeDistributionChart")
          .getContext("2d");
        new Chart(ctx, {
          type: "doughnut",
          data: {
            labels: Object.keys(ranges),
            datasets: [
              {
                data: Object.values(ranges),
                backgroundColor: [
                  "rgba(67, 233, 123, 0.8)",
                  "rgba(79, 172, 254, 0.8)",
                  "rgba(240, 147, 251, 0.8)",
                  "rgba(255, 165, 0, 0.8)",
                  "rgba(255, 100, 100, 0.8)",
                ],
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: {
                labels: { color: "#fff" },
              },
            },
          },
        });
      }

      // 绘制课程平均成绩图
      function drawCourseAverage(grades, courses) {
        const courseAvg = {};

        courses.forEach((c) => {
          const courseGrades = grades.filter((g) => g.courseId === c.id);
          if (courseGrades.length > 0) {
            courseAvg[c.name] =
              courseGrades.reduce((sum, g) => sum + g.score, 0) /
              courseGrades.length;
          }
        });

        const ctx = document.getElementById("courseAvgChart").getContext("2d");
        new Chart(ctx, {
          type: "bar",
          data: {
            labels: Object.keys(courseAvg).slice(0, 10),
            datasets: [
              {
                label: "平均成绩",
                data: Object.values(courseAvg).slice(0, 10),
                backgroundColor: "rgba(79, 172, 254, 0.8)",
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: {
                labels: { color: "#fff" },
              },
            },
            scales: {
              y: {
                beginAtZero: true,
                max: 100,
                ticks: { color: "#fff" },
                grid: { color: "rgba(255, 255, 255, 0.1)" },
              },
              x: {
                ticks: { color: "#fff" },
                grid: { color: "rgba(255, 255, 255, 0.1)" },
              },
            },
          },
        });
      }

      // 绘制学期成绩趋势图
      function drawSemesterTrend(courses, grades) {
        const semesterAvg = {};

        courses.forEach((c) => {
          if (c.semester) {
            const courseGrades = grades.filter((g) => g.courseId === c.id);
            if (courseGrades.length > 0) {
              if (!semesterAvg[c.semester]) semesterAvg[c.semester] = [];
              courseGrades.forEach((g) =>
                semesterAvg[c.semester].push(g.score)
              );
            }
          }
        });

        const avgData = Object.keys(semesterAvg)
          .sort()
          .map((s) => {
            const scores = semesterAvg[s];
            return (
              scores.reduce((sum, score) => sum + score, 0) / scores.length
            );
          });

        const ctx = document
          .getElementById("semesterTrendChart")
          .getContext("2d");
        new Chart(ctx, {
          type: "line",
          data: {
            labels: Object.keys(semesterAvg).sort(),
            datasets: [
              {
                label: "平均成绩",
                data: avgData,
                borderColor: "rgba(67, 233, 123, 1)",
                backgroundColor: "rgba(67, 233, 123, 0.2)",
                tension: 0.4,
                fill: true,
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: {
                labels: { color: "#fff" },
              },
            },
            scales: {
              y: {
                beginAtZero: true,
                max: 100,
                ticks: { color: "#fff" },
                grid: { color: "rgba(255, 255, 255, 0.1)" },
              },
              x: {
                ticks: { color: "#fff" },
                grid: { color: "rgba(255, 255, 255, 0.1)" },
              },
            },
          },
        });
      }

      // 绘制教师授课统计图
      function drawTeacherCourses(courses) {
        const teacherCount = {};

        courses.forEach((c) => {
          const teacherName = c.teacherName || `教师${c.teacherId}`;
          teacherCount[teacherName] = (teacherCount[teacherName] || 0) + 1;
        });

        // 取前10名
        const sorted = Object.entries(teacherCount)
          .sort((a, b) => b[1] - a[1])
          .slice(0, 10);

        const ctx = document
          .getElementById("teacherCoursesChart")
          .getContext("2d");
        new Chart(ctx, {
          type: "bar",
          data: {
            labels: sorted.map(([name]) => name),
            datasets: [
              {
                label: "课程数量",
                data: sorted.map(([, count]) => count),
                backgroundColor: "rgba(240, 147, 251, 0.8)",
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            indexAxis: "y",
            plugins: {
              legend: {
                labels: { color: "#fff" },
              },
            },
            scales: {
              x: {
                beginAtZero: true,
                ticks: { color: "#fff" },
                grid: { color: "rgba(255, 255, 255, 0.1)" },
              },
              y: {
                ticks: { color: "#fff" },
                grid: { color: "rgba(255, 255, 255, 0.1)" },
              },
            },
          },
        });
      }

      // 页面加载时初始化
      document.addEventListener("DOMContentLoaded", () => {
        if (checkAdmin()) {
          loadStatistics();
        }
      });
    </script>
  </body>
</html>
