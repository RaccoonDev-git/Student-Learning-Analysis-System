<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>管理员控制台 - 学情分析系统</title>
    <script src="./js/chart.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", "微软雅黑", sans-serif;
      }

      body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        color: #fff;
      }

      .container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 20px;
      }

      /* 导航栏 */
      .navbar {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        border-radius: 15px;
        padding: 20px 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      }

      .navbar h1 {
        font-size: 28px;
        font-weight: 600;
      }

      .user-info {
        display: flex;
        align-items: center;
        gap: 15px;
      }

      .avatar {
        width: 45px;
        height: 45px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.2);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
      }

      .logout-btn {
        background: rgba(255, 255, 255, 0.2);
        border: none;
        padding: 10px 20px;
        border-radius: 8px;
        color: #fff;
        cursor: pointer;
        transition: all 0.3s;
      }

      .logout-btn:hover {
        background: rgba(255, 255, 255, 0.3);
        transform: translateY(-2px);
      }

      /* 筛选器面板 */
      .filter-panel {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        border-radius: 15px;
        padding: 20px 30px;
        margin-bottom: 30px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      }

      .filter-title {
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 15px;
        display: flex;
        align-items: center;
        gap: 10px;
        opacity: 0.9;
      }

      .filter-controls {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
      }

      .filter-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .filter-group label {
        font-size: 13px;
        font-weight: 500;
        opacity: 0.85;
      }

      .filter-select {
        padding: 10px 15px;
        border: none;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.15);
        color: #fff;
        font-size: 14px;
        cursor: pointer;
        transition: all 0.3s;
      }

      .filter-select:hover {
        background: rgba(255, 255, 255, 0.2);
      }

      .filter-select:focus {
        outline: 2px solid rgba(255, 255, 255, 0.4);
        background: rgba(255, 255, 255, 0.2);
      }

      .filter-select option {
        background: #764ba2;
        color: #fff;
      }

      /* 统计卡片 */
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
      }

      .stat-card {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        border-radius: 15px;
        padding: 25px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        transition: all 0.3s;
      }

      .stat-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2);
      }

      .stat-icon {
        width: 50px;
        height: 50px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        margin-bottom: 15px;
      }

      .stat-icon.users {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      }
      .stat-icon.teachers {
        background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      }
      .stat-icon.students {
        background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      }
      .stat-icon.courses {
        background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
      }

      .stat-value {
        font-size: 32px;
        font-weight: 700;
        margin: 10px 0;
      }

      .stat-label {
        font-size: 14px;
        opacity: 0.9;
      }

      /* 功能按钮网格 */
      .actions-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
      }

      .action-btn {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        border: none;
        border-radius: 15px;
        padding: 30px;
        color: #fff;
        cursor: pointer;
        transition: all 0.3s;
        text-align: center;
        text-decoration: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }

      .action-btn:hover {
        transform: translateY(-5px);
        background: rgba(255, 255, 255, 0.2);
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2);
      }

      .action-btn i {
        font-size: 36px;
        margin-bottom: 10px;
      }

      .action-btn span {
        font-size: 16px;
        font-weight: 500;
      }

      /* 数据表格 */
      .data-section {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        border-radius: 15px;
        padding: 25px;
        margin-bottom: 30px;
      }

      .section-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }

      .section-title {
        font-size: 20px;
        font-weight: 600;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 12px;
        text-align: left;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }

      th {
        font-weight: 600;
        opacity: 0.9;
      }

      tr:hover {
        background: rgba(255, 255, 255, 0.05);
      }

      /* 加载动画 */
      .loading {
        text-align: center;
        padding: 40px;
        font-size: 18px;
      }

      .loading i {
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      /* 图表容器 */
      .charts-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
      }

      .chart-container {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        border-radius: 15px;
        padding: 25px;
      }

      .chart-title {
        font-size: 18px;
        font-weight: 600;
        margin-bottom: 20px;
      }

      canvas {
        max-height: 300px;
      }

      /* 响应式 */
      @media (max-width: 768px) {
        .stats-grid {
          grid-template-columns: 1fr;
        }

        .actions-grid {
          grid-template-columns: 1fr;
        }

        .charts-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- 导航栏 -->
      <div class="navbar">
        <h1><i class="fas fa-shield-alt"></i> 管理员控制台</h1>
        <div class="user-info">
          <div class="avatar">
            <i class="fas fa-user-shield"></i>
          </div>
          <span id="admin-name">管理员</span>
          <button class="logout-btn" onclick="logout()">
            <i class="fas fa-sign-out-alt"></i> 退出登录
          </button>
        </div>
      </div>

      <!-- 数据筛选面板 -->
      <div class="filter-panel">
        <div class="filter-title">
          <i class="fas fa-sliders-h"></i>
          快速筛选
        </div>
        <div class="filter-controls">
          <div class="filter-group">
            <label>统计时间范围</label>
            <select
              id="time-range-filter"
              class="filter-select"
              onchange="applyTimeFilter()"
            >
              <option value="all">全部时间</option>
              <option value="today">今天</option>
              <option value="week">本周</option>
              <option value="month" selected>本月</option>
              <option value="quarter">本季度</option>
              <option value="year">今年</option>
            </select>
          </div>
          <div class="filter-group">
            <label>数据类型</label>
            <select
              id="data-type-filter"
              class="filter-select"
              onchange="applyDataFilter()"
            >
              <option value="all" selected>全部数据</option>
              <option value="users">用户数据</option>
              <option value="courses">课程数据</option>
              <option value="grades">成绩数据</option>
            </select>
          </div>
        </div>
      </div>

      <!-- 统计卡片 -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon users">
            <i class="fas fa-users"></i>
          </div>
          <div class="stat-value" id="total-users">-</div>
          <div class="stat-label">总用户数</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon teachers">
            <i class="fas fa-chalkboard-teacher"></i>
          </div>
          <div class="stat-value" id="total-teachers">-</div>
          <div class="stat-label">教师数量</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon students">
            <i class="fas fa-user-graduate"></i>
          </div>
          <div class="stat-value" id="total-students">-</div>
          <div class="stat-label">学生数量</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon courses">
            <i class="fas fa-book"></i>
          </div>
          <div class="stat-value" id="total-courses">-</div>
          <div class="stat-label">课程数量</div>
        </div>
      </div>

      <!-- 功能按钮 -->
      <div class="actions-grid">
        <a href="user-management.html" class="action-btn">
          <i class="fas fa-users-cog"></i>
          <span>用户管理</span>
        </a>
        <a
          href="#"
          class="action-btn"
          onclick="showCourseManagement(); return false;"
        >
          <i class="fas fa-book-open"></i>
          <span>课程管理</span>
        </a>
        <a
          href="#"
          class="action-btn"
          onclick="showGradeManagement(); return false;"
        >
          <i class="fas fa-chart-line"></i>
          <span>成绩管理</span>
        </a>
        <a
          href="#"
          class="action-btn"
          onclick="showSystemSettings(); return false;"
        >
          <i class="fas fa-cog"></i>
          <span>系统设置</span>
        </a>
        <a href="data-statistics.html" class="action-btn">
          <i class="fas fa-file-chart"></i>
          <span>数据报表</span>
        </a>
        <a href="#" class="action-btn" onclick="showLogs(); return false;">
          <i class="fas fa-history"></i>
          <span>系统日志</span>
        </a>
      </div>

      <!-- 图表数据展示 -->
      <div class="charts-grid">
        <div class="chart-container">
          <div class="chart-title">用户角色分布</div>
          <canvas id="userRoleChart"></canvas>
        </div>
        <div class="chart-container">
          <div class="chart-title">课程统计</div>
          <canvas id="courseStatsChart"></canvas>
        </div>
      </div>

      <!-- 最近活动 -->
      <div class="data-section">
        <div class="section-header">
          <div class="section-title"><i class="fas fa-clock"></i> 最近活动</div>
        </div>
        <div id="recent-activities">
          <div class="loading"><i class="fas fa-spinner"></i> 加载中...</div>
        </div>
      </div>

      <!-- 最近注册用户 -->
      <div class="data-section">
        <div class="section-header">
          <div class="section-title">
            <i class="fas fa-user-plus"></i> 最近注册用户
          </div>
        </div>
        <table>
          <thead>
            <tr>
              <th>用户名</th>
              <th>角色</th>
              <th>邮箱</th>
              <th>注册时间</th>
              <th>状态</th>
            </tr>
          </thead>
          <tbody id="recent-users">
            <tr>
              <td colspan="5" class="loading">
                <i class="fas fa-spinner"></i> 加载中...
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <script>
      const API_BASE_URL = "/api";

      // 从JWT token中获取用户信息
      function getUserInfo() {
        const token = localStorage.getItem("token");
        if (!token) {
          window.location.href = "/index.html";
          return null;
        }

        try {
          const payload = JSON.parse(atob(token.split(".")[1]));
          return payload;
        } catch (error) {
          console.error("解析token失败:", error);
          window.location.href = "/index.html";
          return null;
        }
      }

      // 检查是否为管理员
      function checkAdmin() {
        const userInfo = getUserInfo();
        if (!userInfo || userInfo.role !== "ADMIN") {
          alert("无权访问此页面");
          window.location.href = "/index.html";
          return false;
        }
        // 显示管理员名称
        document.getElementById("admin-name").textContent =
          userInfo.username || "管理员";
        return true;
      }

      // 获取统计数据
      async function loadStatistics() {
        try {
          const token = localStorage.getItem("token");
          const headers = {
            Authorization: `Bearer ${token}`,
            "Content-Type": "application/json",
          };

          // 获取所有学生
          const studentsResponse = await fetch(`${API_BASE_URL}/students`, {
            headers,
          });
          const students = await studentsResponse.json();
          document.getElementById("total-students").textContent =
            students.length;

          // 获取所有教师
          const teachersResponse = await fetch(`${API_BASE_URL}/teachers`, {
            headers,
          });
          const teachers = await teachersResponse.json();
          document.getElementById("total-teachers").textContent =
            teachers.length;

          // 总用户数
          const totalUsers = students.length + teachers.length + 1; // +1 for admin
          document.getElementById("total-users").textContent = totalUsers;

          // 获取所有课程
          const coursesResponse = await fetch(`${API_BASE_URL}/courses`, {
            headers,
          });
          const courses = await coursesResponse.json();
          document.getElementById("total-courses").textContent = courses.length;

          // 绘制图表
          drawUserRoleChart(students.length, teachers.length);
          drawCourseStatsChart(courses);
        } catch (error) {
          console.error("加载统计数据失败:", error);
        }
      }

      // 绘制用户角色分布图
      function drawUserRoleChart(studentCount, teacherCount) {
        const ctx = document.getElementById("userRoleChart").getContext("2d");
        new Chart(ctx, {
          type: "doughnut",
          data: {
            labels: ["学生", "教师", "管理员"],
            datasets: [
              {
                data: [studentCount, teacherCount, 1],
                backgroundColor: [
                  "rgba(79, 172, 254, 0.8)",
                  "rgba(240, 147, 251, 0.8)",
                  "rgba(102, 126, 234, 0.8)",
                ],
                borderWidth: 0,
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: true,
            plugins: {
              legend: {
                labels: {
                  color: "#fff",
                },
              },
            },
          },
        });
      }

      // 绘制课程统计图
      function drawCourseStatsChart(courses) {
        const ctx = document
          .getElementById("courseStatsChart")
          .getContext("2d");

        // 按学期统计
        const semesterMap = {};
        courses.forEach((course) => {
          const semester = course.semester || "未知";
          semesterMap[semester] = (semesterMap[semester] || 0) + 1;
        });

        const labels = Object.keys(semesterMap);
        const data = Object.values(semesterMap);

        new Chart(ctx, {
          type: "bar",
          data: {
            labels: labels,
            datasets: [
              {
                label: "课程数量",
                data: data,
                backgroundColor: "rgba(67, 233, 123, 0.8)",
                borderWidth: 0,
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: true,
            plugins: {
              legend: {
                labels: {
                  color: "#fff",
                },
              },
            },
            scales: {
              y: {
                beginAtZero: true,
                ticks: {
                  color: "#fff",
                },
                grid: {
                  color: "rgba(255, 255, 255, 0.1)",
                },
              },
              x: {
                ticks: {
                  color: "#fff",
                },
                grid: {
                  color: "rgba(255, 255, 255, 0.1)",
                },
              },
            },
          },
        });
      }

      // 应用时间筛选
      function applyTimeFilter() {
        const timeRange = document.getElementById("time-range-filter").value;
        console.log("应用时间筛选:", timeRange);

        // 这里可以实现根据时间范围重新加载数据的逻辑
        // 暂时只显示提示
        const messages = {
          all: "显示全部时间数据",
          today: "显示今天的数据",
          week: "显示本周的数据",
          month: "显示本月的数据",
          quarter: "显示本季度的数据",
          year: "显示今年的数据",
        };

        // 可以在这里添加实际的数据重新加载逻辑
        // loadStatistics(timeRange);
      }

      // 应用数据类型筛选
      function applyDataFilter() {
        const dataType = document.getElementById("data-type-filter").value;
        console.log("应用数据筛选:", dataType);

        // 根据选择的数据类型高亮显示对应的统计卡片
        const allCards = document.querySelectorAll(".stat-card");
        allCards.forEach((card) => {
          card.style.opacity = "1";
          card.style.transform = "scale(1)";
        });

        if (dataType !== "all") {
          const typeMap = {
            users: ["total-users", "total-teachers", "total-students"],
            courses: ["total-courses"],
            grades: [],
          };

          const relevantIds = typeMap[dataType] || [];
          allCards.forEach((card) => {
            const valueElement = card.querySelector(".stat-value");
            if (valueElement && !relevantIds.includes(valueElement.id)) {
              card.style.opacity = "0.5";
              card.style.transform = "scale(0.95)";
            }
          });
        }
      }

      // 加载最近活动
      async function loadRecentActivities() {
        const activitiesDiv = document.getElementById("recent-activities");
        activitiesDiv.innerHTML =
          '<p style="padding: 20px; text-align: center;">功能开发中...</p>';
      }

      // 加载最近注册用户
      async function loadRecentUsers() {
        const tbody = document.getElementById("recent-users");
        tbody.innerHTML =
          '<tr><td colspan="5" style="text-align: center; padding: 20px;">功能开发中...</td></tr>';
      }

      // 功能按钮点击事件
      function showUserManagement() {
        alert(
          "用户管理功能开发中...\n\n将包含:\n- 查看所有用户\n- 添加/编辑/删除用户\n- 重置密码\n- 批量操作"
        );
      }

      function showCourseManagement() {
        alert(
          "课程管理功能开发中...\n\n将包含:\n- 查看所有课程\n- 添加/编辑/删除课程\n- 课程分配\n- 课程统计"
        );
      }

      function showGradeManagement() {
        alert(
          "成绩管理功能开发中...\n\n将包含:\n- 成绩查询\n- 成绩统计\n- 成绩分析\n- 导出报表"
        );
      }

      function showSystemSettings() {
        alert(
          "系统设置功能开发中...\n\n将包含:\n- 学期设置\n- 课程类别\n- 系统参数\n- 备份恢复"
        );
      }

      function showReports() {
        alert(
          "数据报表功能开发中...\n\n将包含:\n- 学生分析报告\n- 教师工作报告\n- 课程统计报告\n- 自定义报表"
        );
      }

      function showLogs() {
        alert(
          "系统日志功能开发中...\n\n将包含:\n- 登录日志\n- 操作日志\n- 错误日志\n- 系统监控"
        );
      }

      // 退出登录
      function logout() {
        if (confirm("确定要退出登录吗?")) {
          localStorage.removeItem("token");
          localStorage.removeItem("userInfo");
          window.location.href = "/index.html";
        }
      }

      // 页面加载时初始化
      document.addEventListener("DOMContentLoaded", () => {
        if (checkAdmin()) {
          loadStatistics();
          loadRecentActivities();
          loadRecentUsers();
        }
      });
    </script>
  </body>
</html>
