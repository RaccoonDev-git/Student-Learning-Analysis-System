<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>页面测试 - 学情分析系统</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .test-links {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        .test-link {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            text-decoration: none;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .test-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            color: white;
            text-decoration: none;
        }
        .test-link i {
            font-size: 2rem;
            margin-bottom: 10px;
            display: block;
        }
        .back-btn {
            background: #6c757d;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .back-btn:hover {
            background: #545b62;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="container">
        <button class="back-btn" onclick="goBack()">
            <i class="fas fa-arrow-left"></i> 返回首页
        </button>
        
        <h1>页面测试</h1>
        <p style="text-align: center; color: #666; margin-bottom: 30px;">
            点击下面的链接测试新创建的页面
        </p>
        
        <div class="test-links">
            <a href="help-center.html" class="test-link">
                <i class="fas fa-question-circle"></i>
                <h3>帮助中心</h3>
                <p>查看客服信息和常见问题</p>
            </a>
            
            <a href="about.html" class="test-link">
                <i class="fas fa-users"></i>
                <h3>关于我们</h3>
                <p>了解我们的团队和项目</p>
            </a>
            
            <a href="index.html" class="test-link">
                <i class="fas fa-home"></i>
                <h3>返回首页</h3>
                <p>回到系统主页</p>
            </a>
        </div>
        
        <div style="background: #f8f9fa; padding: 20px; border-radius: 10px; margin-top: 30px;">
            <h3 style="color: #333; margin-top: 0;">页面功能说明：</h3>
            <ul style="color: #666; line-height: 1.6;">
                <li><strong>帮助中心：</strong>提供客服电话、邮箱、常见问题等支持信息</li>
                <li><strong>关于我们：</strong>展示上海第二工业大学学生团队信息和项目特色</li>
                <li><strong>响应式设计：</strong>两个页面都支持手机、平板、电脑等不同设备</li>
                <li><strong>美观界面：</strong>采用现代化设计风格，用户体验良好</li>
            </ul>
        </div>
    </div>

    <script>
        function goBack() {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
